<div class="min-vh-100 d-flex align-items-center bg-light">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5 col-lg-4">

        <div class="text-center mb-4">
          <i class="bi bi-bank2 text-primary" style="font-size: 3rem;"></i>
          <h2 class="fw-bold mt-2">Crear Cuenta</h2>
          <p class="text-muted">Regístrate para agendar turnos</p>
        </div>

        <div class="card shadow-sm border-0">
          <div class="card-body p-4">

            <div *ngIf="errorMessage" class="alert alert-danger py-2">
              <i class="bi bi-exclamation-circle me-2"></i>{{ errorMessage }}
            </div>

            <form [formGroup]="form" (ngSubmit)="onSubmit()">
              <div class="mb-3">
                <label class="form-label fw-semibold">Usuario</label>
                <div class="input-group">
                  <span class="input-group-text"><i class="bi bi-person"></i></span>
                  <input type="text" class="form-control" formControlName="username"
                    placeholder="Elige un usuario"
                    [class.is-invalid]="form.get('username')?.invalid && form.get('username')?.touched">
                </div>
                <div *ngIf="form.get('username')?.invalid && form.get('username')?.touched"
                     class="text-danger small mt-1">
                  Mínimo 3 caracteres
                </div>
              </div>

              <div class="mb-3">
                <label class="form-label fw-semibold">Contraseña</label>
                <div class="input-group">
                  <span class="input-group-text"><i class="bi bi-lock"></i></span>
                  <input type="password" class="form-control" formControlName="password"
                    placeholder="Mínimo 6 caracteres"
                    [class.is-invalid]="form.get('password')?.invalid && form.get('password')?.touched">
                </div>
              </div>

              <div class="mb-4">
                <label class="form-label fw-semibold">Confirmar Contraseña</label>
                <div class="input-group">
                  <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                  <input type="password" class="form-control" formControlName="confirmPassword"
                    placeholder="Repite tu contraseña"
                    [class.is-invalid]="form.errors?.['passwordMismatch'] && form.get('confirmPassword')?.touched">
                </div>
                <div *ngIf="form.errors?.['passwordMismatch'] && form.get('confirmPassword')?.touched"
                     class="text-danger small mt-1">
                  Las contraseñas no coinciden
                </div>
              </div>

              <button type="submit" class="btn btn-primary w-100" [disabled]="loading">
                <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
                <i *ngIf="!loading" class="bi bi-person-plus me-2"></i>
                {{ loading ? 'Registrando...' : 'Crear Cuenta' }}
              </button>
            </form>

          </div>
        </div>

        <p class="text-center mt-3 text-muted">
          ¿Ya tienes cuenta?
          <a routerLink="/auth/login" class="text-primary fw-semibold">Inicia sesión</a>
        </p>

      </div>
    </div>
  </div>
</div>
