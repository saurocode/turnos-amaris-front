<div class="login-container">

  <div class="bg-shape"></div>

  <div class="container">
    <div class="row min-vh-100 align-items-center justify-content-center">
      <div class="col-md-5 col-lg-4">

        <!-- Logo y título -->
        <div class="text-center mb-4">
          <div class="logo-circle mx-auto mb-3">
            <i class="bi bi-shield-lock"></i>
          </div>
          <h1 class="fw-bold text-white">Panel Admin</h1>
          <p class="text-white-50">Banco Amaris · Acceso restringido</p>
        </div>

        <!-- Card -->
        <div class="glass-card">

          <div class="text-center mb-4">
            <h5 class="fw-bold mb-1">Iniciar Sesión</h5>
            <p class="text-muted small mb-0">Ingresa tus credenciales de administrador</p>
          </div>

          <div *ngIf="errorMessage" class="error-alert mb-3">
            <i class="bi bi-exclamation-triangle me-2"></i>{{ errorMessage }}
          </div>

          <form [formGroup]="form" (ngSubmit)="onSubmit()">

            <div class="mb-3">
              <label class="form-label fw-semibold small text-muted text-uppercase tracking-wide">
                Usuario
              </label>
              <div class="input-modern" [class.input-error]="form.get('username')?.invalid && form.get('username')?.touched">
                <i class="bi bi-person input-icon"></i>
                <input
                  type="text"
                  class="modern-input"
                  formControlName="username"
                  placeholder="Tu usuario"
                  autocomplete="off">
              </div>
              <div *ngIf="form.get('username')?.invalid && form.get('username')?.touched"
                   class="error-text mt-1">
                <i class="bi bi-exclamation-circle me-1"></i>Usuario requerido (mín. 3 caracteres)
              </div>
            </div>

            <div class="mb-4">
              <label class="form-label fw-semibold small text-muted text-uppercase tracking-wide">
                Contraseña
              </label>
              <div class="input-modern" [class.input-error]="form.get('password')?.invalid && form.get('password')?.touched">
                <i class="bi bi-lock input-icon"></i>
                <input
                  type="password"
                  class="modern-input"
                  formControlName="password"
                  placeholder="Tu contraseña">
              </div>
              <div *ngIf="form.get('password')?.invalid && form.get('password')?.touched"
                   class="error-text mt-1">
                <i class="bi bi-exclamation-circle me-1"></i>Contraseña requerida (mín. 6 caracteres)
              </div>
            </div>

            <button type="submit" class="btn-modern w-100" [disabled]="loading || form.invalid">
              <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
              <span>{{ loading ? 'Ingresando...' : 'Ingresar' }}</span>
              <i *ngIf="!loading" class="bi bi-arrow-right-circle ms-2"></i>
            </button>

          </form>

        </div>

        <p class="text-center text-white-50 small mt-4">
          Creado con ❤️ por Sarley Durango
        </p>

      </div>
    </div>
  </div>
</div>
