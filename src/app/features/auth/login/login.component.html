<div class="min-vh-100 d-flex align-items-center bg-light">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5 col-lg-4">

        <div class="text-center mb-4">
          <i class="bi bi-bank2 text-primary" style="font-size: 3rem;"></i>
          <h2 class="fw-bold mt-2">Turnos Amaris</h2>
          <p class="text-muted">Ingresa a tu cuenta</p>
        </div>

        <div class="card shadow-sm border-0">
          <div class="card-body p-4">

            <div *ngIf="errorMessage" class="alert alert-danger py-2">
              <i class="bi bi-exclamation-circle me-2"></i>{{ errorMessage }}
            </div>

            <form [formGroup]="form" (ngSubmit)="onSubmit()">
              <div class="mb-3">
                <label class="form-label fw-semibold">Usuario</label>
                <div class="input-group">
                  <span class="input-group-text"><i class="bi bi-person"></i></span>
                  <input
                    type="text"
                    class="form-control"
                    formControlName="username"
                    placeholder="Tu usuario"
                    [class.is-invalid]="form.get('username')?.invalid && form.get('username')?.touched">
                </div>
                <div *ngIf="form.get('username')?.invalid && form.get('username')?.touched"
                     class="text-danger small mt-1">
                  El usuario es requerido (mínimo 3 caracteres)
                </div>
              </div>

              <div class="mb-4">
                <label class="form-label fw-semibold">Contraseña</label>
                <div class="input-group">
                  <span class="input-group-text"><i class="bi bi-lock"></i></span>
                  <input
                    type="password"
                    class="form-control"
                    formControlName="password"
                    placeholder="Tu contraseña"
                    [class.is-invalid]="form.get('password')?.invalid && form.get('password')?.touched">
                </div>
                <div *ngIf="form.get('password')?.invalid && form.get('password')?.touched"
                     class="text-danger small mt-1">
                  La contraseña es requerida (mínimo 6 caracteres)
                </div>
              </div>

              <button type="submit" class="btn btn-primary w-100" [disabled]="loading">
                <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
                <i *ngIf="!loading" class="bi bi-box-arrow-in-right me-2"></i>
                {{ loading ? 'Ingresando...' : 'Ingresar' }}
              </button>
            </form>

          </div>
        </div>

        <p class="text-center mt-3 text-muted">
          ¿No tienes cuenta?
          <a routerLink="/auth/register" class="text-primary fw-semibold">Regístrate aquí</a>
        </p>

      </div>
    </div>
  </div>
</div>
