<div class="min-vh-100 d-flex align-items-center bg-light">
  <div class="container">

    <div class="text-center mb-5">
      <i class="bi bi-bank2 text-primary" style="font-size: 4rem;"></i>
      <h1 class="fw-bold mt-2">Banco Amaris</h1>
      <p class="text-muted fs-5">Sistema de Agendamiento de Turnos</p>
    </div>

    <div class="row justify-content-center g-4">

      <!-- Tarjeta Cliente -->
      <div class="col-md-5">
        <div class="card border-0 shadow-sm h-100">
          <div class="card-body p-4 text-center">
            <div class="mb-3">
              <span class="bg-primary bg-opacity-10 rounded-circle d-inline-flex p-3">
                <i class="bi bi-person-fill text-primary" style="font-size: 2rem;"></i>
              </span>
            </div>
            <h4 class="fw-bold">Soy Cliente</h4>
            <p class="text-muted mb-4">Agenda o consulta tus turnos ingresando tu número de cédula</p>

            <form [formGroup]="form" (ngSubmit)="ingresarComoCliente()">
              <div class="mb-3">
                <div class="input-group">
                  <span class="input-group-text"><i class="bi bi-person-vcard"></i></span>
                  <input
                    type="text"
                    class="form-control form-control-lg"
                    formControlName="cedula"
                    placeholder="Número de cédula"
                    [class.is-invalid]="form.get('cedula')?.invalid && form.get('cedula')?.touched">
                </div>
                <div *ngIf="form.get('cedula')?.invalid && form.get('cedula')?.touched"
                     class="text-danger small mt-1 text-start">
                  <span *ngIf="form.get('cedula')?.errors?.['required']">La cédula es requerida</span>
                  <span *ngIf="form.get('cedula')?.errors?.['pattern']">Solo se permiten números</span>
                  <span *ngIf="form.get('cedula')?.errors?.['minlength']">Mínimo 6 dígitos</span>
                </div>
              </div>
              <button type="submit" class="btn btn-primary btn-lg w-100" [disabled]="form.invalid">
                <i class="bi bi-arrow-right-circle me-2"></i>Ver mis turnos
              </button>
            </form>

          </div>
        </div>
      </div>

      <!-- Tarjeta Admin -->
      <div class="col-md-5">
        <div class="card border-0 shadow-sm h-100">
          <div class="card-body p-4 text-center d-flex flex-column justify-content-center">
            <div class="mb-3">
              <span class="bg-dark bg-opacity-10 rounded-circle d-inline-flex p-3">
                <i class="bi bi-shield-lock-fill text-dark" style="font-size: 2rem;"></i>
              </span>
            </div>
            <h4 class="fw-bold">Soy Administrador</h4>
            <p class="text-muted mb-4">Accede al panel de administración para gestionar todos los turnos</p>
            <a routerLink="/auth/login" class="btn btn-outline-dark btn-lg w-100">
              <i class="bi bi-box-arrow-in-right me-2"></i>Iniciar sesión
            </a>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>
