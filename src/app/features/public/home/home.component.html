<div class="home-container">

  <!-- Fondo decorativo -->
  <div class="bg-shape"></div>

  <div class="container">
    <div class="row min-vh-100 align-items-center justify-content-center">
      <div class="col-md-5 col-lg-4">

        <!-- Logo y título -->
        <div class="text-center mb-4">
          <div class="logo-circle mx-auto mb-3">
            <i class="bi bi-bank2"></i>
          </div>
          <h1 class="fw-bold text-white">Banco Amaris</h1>
          <p class="text-white-50">Sistema de Agendamiento de Turnos</p>
        </div>

        <!-- Card -->
        <div class="glass-card">

          <div class="text-center mb-4">
            <h5 class="fw-bold mb-1">Consulta tus turnos</h5>
            <p class="text-muted small mb-0">Ingresa tu número de cédula para continuar</p>
          </div>

          <form [formGroup]="form" (ngSubmit)="ingresarComoCliente()">

            <div class="mb-4">
              <label class="form-label fw-semibold small text-muted text-uppercase tracking-wide">
                Número de Cédula
              </label>
              <div class="input-modern" [class.input-error]="form.get('cedula')?.invalid && form.get('cedula')?.touched">
                <i class="bi bi-person-vcard input-icon"></i>
                <input
                  type="text"
                  class="modern-input"
                  formControlName="cedula"
                  placeholder="Ej: 1234567890"
                  autocomplete="off">
              </div>
              <div *ngIf="form.get('cedula')?.invalid && form.get('cedula')?.touched"
                   class="error-text mt-2">
                <i class="bi bi-exclamation-circle me-1"></i>
                <span *ngIf="form.get('cedula')?.errors?.['required']">La cédula es requerida</span>
                <span *ngIf="form.get('cedula')?.errors?.['pattern']">Solo se permiten números</span>
                <span *ngIf="form.get('cedula')?.errors?.['minlength']">Mínimo 6 dígitos</span>
              </div>
            </div>

            <button type="submit" class="btn-modern w-100" [disabled]="form.invalid">
              <span>Ver mis turnos</span>
              <i class="bi bi-arrow-right-circle ms-2"></i>
            </button>

          </form>

          <div class="divider my-4">
            <span>o</span>
          </div>

          <div class="text-center">
            <p class="text-muted small mb-2">¿Necesitas más información?</p>
            <div class="d-flex justify-content-center gap-3">
              <div class="info-chip">
                <i class="bi bi-clock me-1"></i>15 min por turno
              </div>
              <div class="info-chip">
                <i class="bi bi-ticket-perforated me-1"></i>Máx. 5 al día
              </div>
            </div>
          </div>

        </div>

        <p class="text-center text-white-50 small mt-4">
        Creado con ❤️ por Sarley Durango
        </p>

      </div>
    </div>
  </div>
</div>
